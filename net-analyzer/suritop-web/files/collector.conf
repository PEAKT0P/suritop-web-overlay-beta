# /etc/suritop-web/collector.conf
# suritop-web collector configuration
# Config values substituted during emerge by pkg_postinst

[Network]
our_ip = @@SERVER_IP@@

[Database]
host = localhost
name = server_stats
user_r = stats_reader
pass_r = suritop_read_2026
user_w = stats_writer
pass_w = suritop_write_2026

[Interfaces]
monitor = @@NET_INTERFACE@@
